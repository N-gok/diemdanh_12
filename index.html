<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điểm danh Lớp 12A1 (2026-2027)</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --present-color: #d4edda;
            --present-text: #155724;
            --late-color: #fff3cd;
            --late-text: #856404;
            --absent-color: #f8d7da;
            --absent-text: #721c24;
            --border-color: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px 20px 80px 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; background: var(--card-bg); padding: 24px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); position: relative; }
        
        /* Nút Menu 3 gạch ngang (Hamburger Button) */
        .menu-toggle {
            position: absolute;
            top: 24px;
            left: 24px;
            background: #e2e8f0;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 1001;
            transition: all 0.2s;
        }
        .menu-toggle:hover { background-color: #cbd5e1; }

        /* Biến đổi Tab Bar thành Sidebar ẩn */
        .tab-bar {
            position: fixed;
            top: 0;
            left: -280px; /* Ẩn mặc định về bên trái */
            width: 260px;
            height: 100%;
            background: var(--card-bg);
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            padding: 80px 16px 20px 16px;
            gap: 10px;
            z-index: 1000;
            transition: left 0.3s ease;
        }
        .tab-bar.open { left: 0; } /* Hiển thị khi có class .open */
        
        .tab-btn { width: 100%; padding: 14px; border: none; background: #f8fafc; font-weight: bold; color: #64748b; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 1rem; text-align: left; border: 1px solid var(--border-color); }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
        
        /* Lớp nền mờ khi mở Menu */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 999;
        }
        .menu-overlay.show { opacity: 1; pointer-events: auto; }

        .page { display: none; }
        .page.active { display: block; }

        h2 { text-align: center; color: #4a5568; margin-bottom: 8px; font-size: 1.6rem; margin-top: 10px; }
        .sub-title { text-align: center; color: #718096; margin-bottom: 24px; font-size: 1rem; }
        .control-panel { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; text-align: center; }
        .stat-box { padding: 12px; border-radius: 8px; font-weight: bold; font-size: 0.95rem; }
        .stat-present { background-color: var(--present-color); color: var(--present-text); }
        .stat-late { background-color: var(--late-color); color: var(--late-text); }
        .stat-absent { background-color: var(--absent-color); color: var(--absent-text); }
        
        .action-buttons { display: block; }
        .btn-reset { width: 100%; padding: 12px; background-color: #e2e8f0; color: #4a5568; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-reset:hover { background-color: #cbd5e1; }

        .student-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; max-height: 40vh; overflow-y: auto; padding-right: 4px; }
        .student-list::-webkit-scrollbar { width: 6px; }
        .student-list::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; }
        .student-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #fdfdfd; border: 1px solid var(--border-color); border-radius: 10px; transition: all 0.2s ease; }
        .student-info { display: flex; align-items: center; gap: 12px; font-size: 1rem; }
        .stt { font-weight: bold; color: #a0aec0; min-width: 24px; }
        .name { font-weight: 500; }
        .btn-group { display: flex; gap: 6px; }
        .btn-status { border: 1px solid var(--border-color); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; background-color: #fff; color: #4a5568; transition: all 0.15s ease; }
        
        .student-row.status-present { background-color: var(--present-color); border-color: #c3e6cb; }
        .student-row.status-present .btn-p { background-color: #28a745; color: white; border-color: #28a745; }
        .student-row.status-late { background-color: var(--late-color); border-color: #ffeeba; }
        .student-row.status-late .btn-l { background-color: #ffc107; color: #212529; border-color: #ffc107; }
        .student-row.status-absent { background-color: var(--absent-color); border-color: #f5c6cb; }
        .student-row.status-absent .btn-a { background-color: #dc3545; color: white; border-color: #dc3545; }
        
        .archive-action-zone { display: flex; justify-content: flex-end; margin-bottom: 12px; }
        .btn-save-archive { padding: 8px 16px; background-color: #e2e8f0; color: #4a5568; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .btn-save-archive:hover { background-color: #cbd5e1; }

        /* Message Area */
        .message-section { border-top: 2px dashed var(--border-color); padding-top: 20px; display: flex; flex-direction: column; gap: 20px; }
        .message-container { display: flex; flex-direction: column; }
        .message-label { font-weight: bold; color: #4a5568; margin-bottom: 8px; display: block; font-size: 0.95rem; }
        .message-box { width: 100%; height: 85px; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background-color: #f8fafc; font-size: 0.95rem; color: #334155; resize: none; outline: none; line-height: 1.5; }
        .btn-copy { display: block; width: 100%; padding: 10px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: bold; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
        .btn-copy:hover { background-color: var(--primary-hover); }
        
        /* Thư viện Lịch sử */
        .archive-list { display: flex; flex-direction: column; gap: 14px; margin-top: 10px; }
        .archive-card { background: #f8fafc; border: 1px solid var(--border-color); padding: 16px; border-radius: 12px; position: relative; }
        .archive-title { font-weight: bold; font-size: 1.1rem; color: #1e293b; margin-bottom: 4px; }
        .archive-date { font-size: 0.85rem; color: #64748b; margin-bottom: 10px; }
        .archive-details { font-size: 0.95rem; line-height: 1.5; }
        .btn-delete-archive { position: absolute; top: 16px; right: 16px; background: #fee2e2; color: #ef4444; border: none; padding: 6px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
        .btn-delete-archive:hover { background: #fca5a5; }
        .empty-archive { text-align: center; color: #94a3b8; padding: 40px 0; font-style: italic; }

        /* Giao diện Popup Nhập tiêu đề lưu dữ liệu (Modal) */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: all 0.25s ease; z-index: 2000; }
        .modal.show { opacity: 1; pointer-events: auto; }
        .modal-content { background: white; padding: 24px; border-radius: 16px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .modal-title { font-weight: bold; font-size: 1.2rem; margin-bottom: 16px; color: #1e293b; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 6px; color: #475569; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 0.95rem; outline: none; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
        .btn-cancel { padding: 10px 16px; background: #e2e8f0; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-confirm { padding: 10px 16px; background: #059669; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 3000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        @media (max-width: 600px) {
            body { padding: 10px 10px 80px 10px; }
            .container { padding: 16px; border-radius: 12px; }
            .menu-toggle { top: 16px; left: 16px; width: 36px; height: 36px; font-size: 1.1rem; }
            h2 { font-size: 1.2rem; margin-top: 40px; } /* Đẩy chữ tiêu đề xuống tránh đè menu trên Mobile */
            .student-row { flex-direction: column; align-items: flex-start; gap: 12px; padding: 12px; }
            .btn-group { width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .btn-status { padding: 10px 0; text-align: center; font-size: 0.9rem; }
            .student-list { max-height: 40vh; }
        }
    </style>
</head>
<body>

<div class="container">
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>

    <div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>

    <div class="tab-bar" id="sidebar-menu">
        <button class="tab-btn active" onclick="switchPage('home')"> Trang chủ</button>
        <button class="tab-btn" onclick="switchPage('archive')"> Thư viện lịch sử</button>
    </div>

    <div id="page-home" class="page active">
        <h2>DANH SÁCH HỌC SINH LỚP 12A1</h2>
        <div class="sub-title">Năm học 2026 - 2027</div>

        <div class="control-panel">
            <div class="stats-bar">
                <div class="stat-box stat-present">Có mặt: <span id="count-present">0</span></div>
                <div class="stat-box stat-late">Muộn: <span id="count-late">0</span></div>
                <div class="stat-box stat-absent">Vắng: <span id="count-absent">48</span></div>
            </div>
            <div class="action-buttons">
                <button class="btn-reset" onclick="resetToDefault()"> Đặt lại vắng</button>
            </div>
        </div>

        <div class="student-list" id="student-list-container"></div>

        <div class="archive-action-zone">
            <button class="btn-save-archive" onclick="openSaveModal()"> Lưu vào thư viện</button>
        </div>

        <div class="message-section">
            <div class="message-container">
                <label class="message-label" for="sms-absent-output"> Danh sách vắng</label>
                <textarea id="sms-absent-output" class="message-box" readonly></textarea>
                <button class="btn-copy" onclick="copyToClipboard('sms-absent-output')">Sao chép DS Vắng</button>
            </div>

            <div class="message-container">
                <label class="message-label" for="sms-late-output"> Danh sách muộn</label>
                <textarea id="sms-late-output" class="message-box" readonly></textarea>
                <button class="btn-copy" onclick="copyToClipboard('sms-late-output')">Sao chép DS Đi Muộn</button>
            </div>
        </div>
    </div>

    <div id="page-archive" class="page">
        <h2>THƯ VIỆN LỊCH SỬ ĐIỂM DANH</h2>
        <div class="sub-title">Dữ liệu đã lưu trữ</div>
        <div class="archive-list" id="archive-list-container"></div>
    </div>
</div>

<div class="modal" id="save-modal">
    <div class="modal-content">
        <div class="modal-title">Lưu dữ liệu điểm danh</div>
        <div class="form-group">
            <label for="modal-title-input">Tiêu đề :</label>
            <input type="text" id="modal-title-input" value="Điểm danh lớp 12A1">
        </div>
        <div class="form-group">
            <label for="modal-date-input">Ngày:</label>
            <input type="date" id="modal-date-input">
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeSaveModal()">Hủy bỏ</button>
            <button class="btn-confirm" onclick="confirmSaveArchive()">Xác nhận lưu</button>
        </div>
    </div>
</div>

<div class="toast" id="toast-msg">Đã copy vào bộ nhớ tạm!</div>

<script>
    // ĐĂNG KÝ SERVICE WORKER (PWA)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Bộ cài offline hoạt động tốt!'))
                .catch(err => console.log('Lỗi cài đặt offline:', err));
        });
    }

    const students = [
        "Trần Tuấn An", "Dương Bảo Anh", "Đàm Việt Anh", "Đào Minh Anh", "Lê Trần Đức Anh", 
        "Ngô Đức Anh", "Nguyễn Diệu Anh", "Phạm Kỳ Anh", "Đỗ Xuân Bách", "Vũ Đình Xuân Bách", 
        "Hoàng Quốc Bảo", "Nguyễn Quang Bảo", "Nguyễn Viết Gia Bảo", "Vũ Minh Châu", "Trần Minh Duy", 
        "Lê Hữu Đạt", "Trần Ngọc Gia Hân", "Nguyễn Quốc Hùng", "Nguyễn Đỗ Huy", "Nguyễn Ngọc Phát Huy", "Nguyễn Vũ Nguyên Khang", 
        "Trần Vĩnh Khang", "Nguyễn Bảo Khánh", "Trần Đình Khánh", "Nguyễn Đức Minh Khôi", "Huỳnh Nguyễn Hoàng Lân", 
        "Nguyễn Ngọc Diệu Linh", "Nguyễn Tuấn Linh", "Trần Trúc Linh", "Vũ Lê Hoàng Mai", "Đào Tuấn Minh", 
        "Hồ Đức Minh", "Nguyễn Tuấn Minh", "Phan Đào Nhật Minh", "Trương Đình Minh", "Lê Minh Nghĩa", 
        "Nguyễn Minh Nghĩa", "Nguyễn Kim Ngọc", "Khuất Tuấn Phong", "Lương Thế Phong", "Phạm Tô Tường Phong", 
        "Hoàng Minh Quang", "Nguyễn Khang Sơn", "Nguyễn Thanh Tâm", "Nguyễn Thị Kim Thanh", "Lê Minh Thành", 
        "Mai Ngọc Trâm", "Đặng Quang Đức Trí"
    ].map(name => name.trim());

    const exceptions = [
        "Nguyễn Minh Nghĩa", "Lê Minh Nghĩa", "Đào Tuấn Minh", "Nguyễn Tuấn Minh", 
        "Hồ Đức Minh", "Lê Trần Đức Anh", "Ngô Đức Anh", "Vũ Đình Xuân Bách", "Đỗ Xuân Bách"
    ];

    function formatShortName(fullName) {
        if (exceptions.includes(fullName)) return fullName;
        const nameParts = fullName.split(" ");
        if (nameParts.length <= 2) return fullName;
        return nameParts.slice(-2).join(" ");
    }

    let attendanceStatus = [];
    let archiveData = [];

    // HÀM ĐÓNG MỞ MENU Hamburger
    function toggleMenu() {
        const sidebar = document.getElementById('sidebar-menu');
        const overlay = document.getElementById('menu-overlay');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('show');
    }

    function switchPage(pageName) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        
        if (pageName === 'home') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('page-home').classList.add('active');
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('page-archive').classList.add('active');
            renderArchive();
        }
        
        // Chuyển trang xong thì tự động thu Menu lại
        toggleMenu();
    }

    function loadData() {
        const savedData = localStorage.getItem('attendance_12A1');
        if (savedData) {
            const parsedData = JSON.parse(savedData);
            if (parsedData.length === students.length) {
                attendanceStatus = parsedData;
            } else {
                attendanceStatus = students.map(() => 'absent');
            }
        } else {
            attendanceStatus = students.map(() => 'absent');
        }

        const savedArchive = localStorage.getItem('attendance_archive_12A1');
        if (savedArchive) {
            archiveData = JSON.parse(savedArchive);
        }
    }

    const container = document.getElementById('student-list-container');

    function renderList() {
        container.innerHTML = '';
        students.forEach((name, index) => {
            const stt = index + 1;
            const currentStatus = attendanceStatus[index];
            
            let rowClass = 'student-row';
            if (currentStatus === 'present') rowClass += ' status-present';
            if (currentStatus === 'late') rowClass += ' status-late';
            if (currentStatus === 'absent') rowClass += ' status-absent';

            container.innerHTML += `
                <div class="${rowClass}" id="row-${index}">
                    <div class="student-info">
                        <span class="stt">${stt}</span>
                        <span class="name">${name}</span>
                    </div>
                    <div class="btn-group">
                        <button class="btn-status btn-p" onclick="setStatus(${index}, 'present')">Có mặt</button>
                        <button class="btn-status btn-l" onclick="setStatus(${index}, 'late')">Muộn</button>
                        <button class="btn-status btn-a" onclick="setStatus(${index}, 'absent')">Vắng</button>
                    </div>
                </div>
            `;
        });
        updateSummary();
    }

    function setStatus(index, status) {
        attendanceStatus[index] = status;
        localStorage.setItem('attendance_12A1', JSON.stringify(attendanceStatus));
        const row = document.getElementById(`row-${index}`);
        row.className = 'student-row ' + (status === 'present' ? 'status-present' : status === 'late' ? 'status-late' : 'status-absent');
        updateSummary();
    }

    function resetToDefault() {
        if (confirm("Đặt lại tất cả học sinh về trạng thái 'Vắng'?")) {
            attendanceStatus = students.map(() => 'absent');
            localStorage.setItem('attendance_12A1', JSON.stringify(attendanceStatus));
            renderList();
            showToast("Đã đặt lại dữ liệu mặc định!");
        }
    }

    function updateSummary() {
        let present = 0, late = 0, absent = 0;
        let absentList = [], lateList = [];
        
        attendanceStatus.forEach((status, i) => {
            if (status === 'present') present++;
            if (status === 'late') { late++; lateList.push(formatShortName(students[i])); }
            if (status === 'absent') { absent++; absentList.push(formatShortName(students[i])); }
        });
        
        document.getElementById('count-present').innerText = present;
        document.getElementById('count-late').innerText = late;
        document.getElementById('count-absent').innerText = absent;

        let absentMsg = `Hiện tại vắng (${absent}) gồm:.\n`;
        if (absent === 0) {
            absentMsg += `...`;
        } else {
            absentMsg += `${absentList.join(', ')}.`;
        }
        document.getElementById('sms-absent-output').value = absentMsg.trim();

        let lateMsg = `Danh sách học sinh đi muộn:\n`;
        if (late === 0) {
            lateMsg += `...`;
        } else {
            lateMsg += `- Đi muộn (${late}): ${lateList.join(', ')}.`;
        }
        document.getElementById('sms-late-output').value = lateMsg.trim();
    }

    /* LOGIC THƯ VIỆN */
    if (!window.openSaveModal) {
        window.openSaveModal = function() {
            const modal = document.getElementById('save-modal');
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('modal-date-input').value = today;
            modal.classList.add('show');
        };
    }

    if (!window.closeSaveModal) {
        window.closeSaveModal = function() {
            document.getElementById('save-modal').classList.remove('show');
        };
    }

    function confirmSaveArchive() {
        const title = document.getElementById('modal-title-input').value.trim() || "Điểm danh lớp 12A1";
        const rawDate = document.getElementById('modal-date-input').value;
        
        let formattedDate = rawDate;
        if (rawDate) {
            const parts = rawDate.split('-');
            formattedDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
        }

        let absentList = [], lateList = [];
        attendanceStatus.forEach((status, i) => {
            if (status === 'absent') absentList.push(formatShortName(students[i]));
            if (status === 'late') lateList.push(formatShortName(students[i]));
        });

        const newRecord = {
            id: Date.now(),
            title: title,
            date: formattedDate,
            presentCount: attendanceStatus.filter(s => s === 'present').length,
            lateCount: lateList.length,
            absentCount: absentList.length,
            absents: absentList,
            lates: lateList
        };

        archiveData.unshift(newRecord);
        localStorage.setItem('attendance_archive_12A1', JSON.stringify(archiveData));
        
        closeSaveModal();
        showToast("Đã lưu thành công!");
    }

    function renderArchive() {
        const archiveContainer = document.getElementById('archive-list-container');
        archiveContainer.innerHTML = '';

        if (archiveData.length === 0) {
            archiveContainer.innerHTML = `<div class="empty-archive">Thư viện trống. Chưa có dữ liệu điểm danh nào được lưu.</div>`;
            return;
        }

        archiveData.forEach(item => {
            let absentText = item.absentCount > 0 ? item.absents.join(', ') : 'Không có';
            let lateText = item.lateCount > 0 ? item.lates.join(', ') : 'Không có';

            archiveContainer.innerHTML += `
                <div class="archive-card">
                    <div class="archive-title">${item.title}</div>
                    <div class="archive-date"> Ngày: ${item.date} | Sĩ số: 48 người</div>
                    <div class="archive-details">
                        <p style="color: #c2410c; font-weight: 600;"> Vắng (${item.absentCount}): <span style="font-weight: normal; color: #334155;">${absentText}</span></p>
                        <p style="color: #b45309; font-weight: 600; margin-top: 4px;"> Muộn (${item.lateCount}): <span style="font-weight: normal; color: #334155;">${lateText}</span></p>
                    </div>
                    <button class="btn-delete-archive" onclick="deleteArchive(${item.id})">Xóa</button>
                </div>
            `;
        });
    }

    function deleteArchive(id) {
        if (confirm("Bạn có chắc chắn muốn xóa bản ghi này không?")) {
            archiveData = archiveData.filter(item => item.id !== id);
            localStorage.setItem('attendance_archive_12A1', JSON.stringify(archiveData));
            renderArchive();
            showToast("Đã xóa!");
        }
    }

    function showToast(text) {
        const toast = document.getElementById("toast-msg");
        toast.innerText = text; toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
    }

    function copyToClipboard(elementId) {
        const copyText = document.getElementById(elementId);
        copyText.select();
        navigator.clipboard.writeText(copyText.value).then(() => showToast("Đã copy vào bộ nhớ tạm!"));
    }

    loadData();
    renderList();
</script>
</body>
</html>
