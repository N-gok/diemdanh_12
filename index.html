<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điểm danh Lớp 12A1 (2026-2027)</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-pastel: #e8f0fe;
            --present-color: #d4edda;
            --present-text: #155724;
            --late-color: #fff3cd;
            --late-text: #856404;
            --absent-color: #f8d7da;
            --absent-text: #721c24;
            --border-color: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; background: var(--card-bg); padding: 24px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
        h2 { text-align: center; color: #4a5568; margin-bottom: 8px; font-size: 1.6rem; }
        .sub-title { text-align: center; color: #718096; margin-bottom: 24px; font-size: 1rem; }
        .control-panel { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; text-align: center; }
        .stat-box { padding: 12px; border-radius: 8px; font-weight: bold; font-size: 0.95rem; }
        .stat-present { background-color: var(--present-color); color: var(--present-text); }
        .stat-late { background-color: var(--late-color); color: var(--late-text); }
        .stat-absent { background-color: var(--absent-color); color: var(--absent-text); }
        .btn-reset { width: 100%; padding: 10px; background-color: #e2e8f0; color: #4a5568; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-reset:hover { background-color: #cbd5e1; color: #1e293b; }
        .student-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; max-height: 45vh; overflow-y: auto; padding-right: 4px; }
        .student-list::-webkit-scrollbar { width: 6px; }
        .student-list::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; }
        .student-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #fdfdfd; border: 1px solid var(--border-color); border-radius: 10px; transition: all 0.2s ease; }
        .student-info { display: flex; align-items: center; gap: 12px; font-size: 1rem; }
        .stt { font-weight: bold; color: #a0aec0; min-width: 24px; }
        .name { font-weight: 500; }
        .btn-group { display: flex; gap: 6px; }
        .btn-status { border: 1px solid var(--border-color); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; background-color: #fff; color: #4a5568; transition: all 0.15s ease; }
        .student-row.status-present { background-color: var(--present-color); border-color: #c3e6cb; }
        .student-row.status-present .btn-p { background-color: #28a745; color: white; border-color: #28a745; }
        .student-row.status-late { background-color: var(--late-color); border-color: #ffeeba; }
        .student-row.status-late .btn-l { background-color: #ffc107; color: #212529; border-color: #ffc107; }
        .student-row.status-absent { background-color: var(--absent-color); border-color: #f5c6cb; box-shadow: 0 2px 8px rgba(220, 53, 69, 0.08); }
        .student-row.status-absent .btn-a { background-color: #dc3545; color: white; border-color: #dc3545; }
        .message-section { border-top: 2px dashed var(--border-color); padding-top: 20px; }
        .message-label { font-weight: bold; color: #4a5568; margin-bottom: 8px; display: block; }
        .message-box { width: 100%; height: 100px; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background-color: #f1f5f9; font-size: 0.95rem; color: #334155; resize: none; outline: none; line-height: 1.5; }
        .btn-copy { display: block; width: 100%; padding: 12px; background-color: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .btn-copy:hover { background-color: #4338ca; }
        .btn-copy:active { background-color: #3730a3; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 16px; border-radius: 12px; }
            h2 { font-size: 1.3rem; }
            .student-row { flex-direction: column; align-items: flex-start; gap: 12px; padding: 12px; }
            .btn-group { width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .btn-status { padding: 10px 0; text-align: center; font-size: 0.9rem; }
            .student-list { max-height: 50vh; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>DANH SÁCH HỌC SINH LỚP 12A1</h2>
    <div class="sub-title">Năm học 2026 - 2027</div>

    <div class="control-panel">
        <div class="stats-bar">
            <div class="stat-box stat-present">Có mặt: <span id="count-present">0</span></div>
            <div class="stat-box stat-late">Muộn: <span id="count-late">0</span></div>
            <div class="stat-box stat-absent">Vắng: <span id="count-absent">48</span></div>
        </div>
        <button class="btn-reset" onclick="resetToDefault()"> Đặt lại mặc định (Tất cả vắng)</button>
    </div>

    <div class="student-list" id="student-list-container"></div>

    <div class="message-section">
        <label class="message-label" for="sms-output">Tin nhắn mẫu:</label>
        <textarea id="sms-output" class="message-box" readonly></textarea>
        <button class="btn-copy" onclick="copyToClipboard()">Sao chép tin nhắn</button>
    </div>
</div>

<div class="toast" id="toast-msg">Đã copy vào bộ nhớ tạm!</div>

<script>
    // ĐĂNG KÝ SERVICE WORKER ĐỂ CHẠY OFFLINE KHI KHÔNG CÓ MẠNG
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Bộ cài offline hoạt động tốt!'))
                .catch(err => console.log('Lỗi cài đặt offline:', err));
        });
    }

    const students = [
        "Trần Tuấn An", "Dương Bảo Anh", "Đàm Việt Anh", "Đào Minh Anh", "Lê Trần Đức Anh", 
        "Ngô Đức Anh", "Nguyễn Diệu Anh", "Phạm Kỳ Anh", "Đỗ Xuân Bách", "Vũ Đình Xuân Bách", 
        "Hoàng Quốc Bảo", "Nguyễn Quang Bảo", "Nguyễn Viết Gia Bảo", "Vũ Minh Châu", "Trần Minh Duy", 
        "Lê Hữu Đạt", "Trần Ngọc Gia Hân", "Nguyễn Quốc Hùng", "Nguyễn Đỗ Huy", "Nguyễn Ngọc Phát Huy", "Nguyễn Vũ Nguyên Khang", 
        "Trần Vĩnh Khang", "Nguyễn Bảo Khánh", "Trần Đình Khánh", "Nguyễn Đức Minh Khôi", "Huỳnh Nguyễn Hoàng Lân", 
        "Nguyễn Ngọc Diệu Linh", "Nguyễn Tuấn Linh", "Trần Trúc Linh", "Vũ Lê Hoàng Mai", "Đào Tuấn Minh", 
        "Hồ Đức Minh", "Nguyễn Tuấn Minh", "Phan Đào Nhật Minh", "Trương Đình Minh", "Lê Minh Nghĩa", 
        "Nguyễn Minh Nghĩa", "Nguyễn Kim Ngọc", "Khuất Tuấn Phong", "Lương Thế Phong", "Phạm Tô Tường Phong", 
        "Hoàng Minh Quang", "Nguyễn Khang Sơn", "Nguyễn Thanh Tâm", "Nguyễn Thị Kim Thanh", "Lê Minh Thành", 
        "Mai Ngọc Trâm", "Đặng Quang Đức Trí"
    ].map(name => name.trim());

    const exceptions = [
        "Nguyễn Minh Nghĩa", "Lê Minh Nghĩa", "Đào Tuấn Minh", "Nguyễn Tuấn Minh", 
        "Hồ Đức Minh", "Lê Trần Đức Anh", "Ngô Đức Anh", "Vũ Đình Xuân Bách", "Đỗ Xuân Bách"
    ];

    function formatShortName(fullName) {
        if (exceptions.includes(fullName)) return fullName;
        const nameParts = fullName.split(" ");
        if (nameParts.length <= 2) return fullName;
        return nameParts.slice(-2).join(" ");
    }

    let attendanceStatus = [];

    function loadData() {
        const savedData = localStorage.getItem('attendance_12A1');
        if (savedData) {
            const parsedData = JSON.parse(savedData);
            if (parsedData.length === students.length) {
                attendanceStatus = parsedData;
            } else {
                attendanceStatus = students.map(() => 'absent');
                localStorage.setItem('attendance_12A1', JSON.stringify(attendanceStatus));
            }
        } else {
            attendanceStatus = students.map(() => 'absent');
        }
    }

    const container = document.getElementById('student-list-container');

    function renderList() {
        container.innerHTML = '';
        students.forEach((name, index) => {
            const stt = index + 1;
            const currentStatus = attendanceStatus[index];
            
            let rowClass = 'student-row';
            if (currentStatus === 'present') rowClass += ' status-present';
            if (currentStatus === 'late') rowClass += ' status-late';
            if (currentStatus === 'absent') rowClass += ' status-absent';

            container.innerHTML += `
                <div class="${rowClass}" id="row-${index}">
                    <div class="student-info">
                        <span class="stt">${stt}</span>
                        <span class="name">${name}</span>
                    </div>
                    <div class="btn-group">
                        <button class="btn-status btn-p" onclick="setStatus(${index}, 'present')">Có mặt</button>
                        <button class="btn-status btn-l" onclick="setStatus(${index}, 'late')">Muộn</button>
                        <button class="btn-status btn-a" onclick="setStatus(${index}, 'absent')">Vắng</button>
                    </div>
                </div>
            `;
        });
        updateSummary();
    }

    function setStatus(index, status) {
        attendanceStatus[index] = status;
        localStorage.setItem('attendance_12A1', JSON.stringify(attendanceStatus));
        const row = document.getElementById(`row-${index}`);
        row.className = 'student-row ' + (status === 'present' ? 'status-present' : status === 'late' ? 'status-late' : 'status-absent');
        updateSummary();
    }

    function resetToDefault() {
        if (confirm("Đặt lại tất cả học sinh về trạng thái 'Vắng'?")) {
            attendanceStatus = students.map(() => 'absent');
            // Đã sửa thành đồng bộ lưu trữ khóa 'attendance_12A1'
            localStorage.setItem('attendance_12A1', JSON.stringify(attendanceStatus));
            renderList();
            showToast("Đã đặt lại dữ liệu mặc định!");
        }
    }

    function updateSummary() {
        let present = 0, late = 0, absent = 0, absentList = [];
        attendanceStatus.forEach((status, i) => {
            if (status === 'present') present++;
            if (status === 'late') late++;
            if (status === 'absent') { absent++; absentList.push(formatShortName(students[i])); }
        });
        document.getElementById('count-present').innerText = present;
        document.getElementById('count-late').innerText = late;
        document.getElementById('count-absent').innerText = absent;

        document.getElementById('sms-output').value = absent === 0 ? 
            `Tình hình điểm danh lớp 12A1 hôm nay: Sĩ số đủ (48/48 học sinh có mặt).` : 
            `Hiện đang vắng ${absent} người gồm: ${absentList.join(', ')}.`;
    }

    function showToast(text) {
        const toast = document.getElementById("toast-msg");
        toast.innerText = text; toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
    }

    function copyToClipboard() {
        const copyText = document.getElementById("sms-output");
        copyText.select();
        navigator.clipboard.writeText(copyText.value).then(() => showToast("Đã copy vào bộ nhớ tạm!"));
    }

    loadData();
    renderList();
</script>
</body>
</html>
